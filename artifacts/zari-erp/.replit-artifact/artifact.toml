kind = "web"
previewPath = "/"
title = "ZARI ERP"
version = "1.0.0"
id = "artifacts/zari-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21766

[services.development]
run = "pnpm --filter @workspace/zari-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zari-erp", "run", "build" ]
publicDir = "artifacts/zari-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21766"
BASE_PATH = "/"
